<!doctype html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/wysiwyg4all@latest/dist/wysiwyg4all.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wysiwyg4all@latest/dist/wysiwyg4all.css" />
<!-- <script src="dist/wysiwyg4all.js"></script>
<link rel="stylesheet" href="dist/wysiwyg4all.css"> -->
<script src="plugins.js"></script>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<h1>Wysiwyg4All</h1>
<div class="wysiwyg-wrap">
    <div id="myeditor" style="padding:1rem; border: solid 1px teal"></div>
</div>
<br>
<!-- command examples below -->
<button onclick="wysiwyg.command('bold')" id="bold">
    Bold
</button>
<button onclick="wysiwyg.command('h1')" id="h1">
    H1
</button>
<button onclick="wysiwyg.command('h2')" id="h2">
    H2
</button>
<button onclick="wysiwyg.command('h3')" id="h3">
    H3
</button>
<button onclick="wysiwyg.command('h4')" id="h4">
    H4
</button>
<button onclick="wysiwyg.command('h5')" id="h5">
    H5
</button>
<button onclick="wysiwyg.command('h6')" id="h6">
    H6
</button>
<button onclick="wysiwyg.command('small')" id="small">
    Small
</button>
<button onclick="wysiwyg.command('italic')" id="italic">
    Italic
</button>
<button onclick="wysiwyg.command('underline')" id="underline">
    Underline
</button>
<button onclick="wysiwyg.command('strike')" id="strike">
    Strike
</button>

<input id='colorInput' type='color' oninput="wysiwyg.command({color: this.value})" />
<input id='backgroundColorInput' type='color' oninput="wysiwyg.command({backgroundColor: this.value})" />
<button onclick="wysiwyg.command('unorderedList')" id="unorderedList">
    Unordered list
</button>
<button onclick="wysiwyg.command('orderedList')" id="orderedList">
    Ordered list
</button>
<button onclick="wysiwyg.command('alignLeft')" id="alignLeft">
    Align left
</button>
<button onclick="wysiwyg.command('alignCenter')" id="alignCenter">
    Align center
</button>
<button onclick="wysiwyg.command('alignRight')" id="alignRight">
    Align right
</button>
<button onclick="wysiwyg.command('color')">
    <!-- .command('color') changes text to highlight color set on constructor -->
    Color
</button>
<button onclick="wysiwyg.command('divider')">
    Divider
</button>
<!-- Highlight color is applied on quote -->
<button onclick="wysiwyg.command('quote')" id="quote">
    Quote
</button>
<!-- check out the callback to pre process image element before load -->
<button onclick="wysiwyg.command('image')">
    Image
</button>
<!-- You can add custom element -->
<button onclick="addSmile()">
    Smile
</button>
<!-- You can add custom element -->
<button onclick="tablePlugin(4,4)">
    Table
</button>
<button onclick="exportData()">
    Export
</button>
<style>
    button, input[type="color"] {
        height: 2em;
        vertical-align: middle;
        margin-bottom: 0.5rem;
    }
    button {
        background-color: white;
    }
</style>
<script>
    let wysiwyg = new Wysiwyg4All({
        elementId: 'myeditor',
        hashtag: true,
        urllink: true,
        placeholder: "Build your custom wysiwyg",
        highlightColor: 'limegreen',
        // backgroundColor: 'white',
        // spellcheck: true,
        // fontSize: {
        //     desktop: "18px",
        //     tablet: "16px",
        //     phone: "14px",
        //     h1: 4.2,
        //     h2: 3.56,
        //     h3: 2.92,
        //     h4: 2.28,
        //     h5: 1.64,
        //     h6: 1.15,
        //     small: 0.8,
        // },
        callback: c => {
            if (c.caratPosition) {
                // Tracks carat position
                // Make carat to be always within the viewport
                let viewPortHeight = Math.min(document.documentElement.clientHeight || 0, window.innerHeight || 0);
                let minusWhenOutOfView = viewPortHeight - c.caratPosition.top;
                if (minusWhenOutOfView < 0) {
                    window.scrollBy(0, -minusWhenOutOfView);
                }
            }

            if (c.commandTracker) {
                // {
                //     "unorderedList": boolean;
                //     "orderedList": boolean;
                //     "alignLeft": boolean;
                //     "alignCenter": boolean;
                //     "alignRight": boolean;
                //     "h1": boolean;
                //     "h2": boolean;
                //     "h3": boolean;
                //     "h4": boolean;
                //     "h5": boolean;
                //     "h6": boolean;
                //     "small": boolean;
                //     "bold": boolean;
                //     "italic": boolean;
                //     "underline": boolean;
                //     "strike": boolean;
                //     "color": string;
                //     "backgroundColor": string;
                // };
                let ct = c.commandTracker;
                for(let k in ct) {
                    let el = document.getElementById(k);
                    if (el) {
                        if (ct[k] === true) {
                            el.style.backgroundColor = "lightblue";
                        } else if (ct[k] === false) {
                            el.style.backgroundColor = 'white';
                        }
                    }
                }

                const colorInput = document.getElementById('colorInput');
                const backgroundColorInput = document.getElementById('backgroundColorInput');
                colorInput.value = ct.color || wysiwyg.defaultFontColor;
                backgroundColorInput.value = ct.backgroundColor || wysiwyg.defaultBackgroundColor;
            }

            if (c.image) {
                // you can modify image element before it gets loaded
                for (let img of c.image) {
                    img.style = {
                        border: 'solid 4px red'
                    };
                    img.onclick = () => {
                        alert(`image clicked!`);
                    };
                }
            }

            if (c.hashtag) {
                // you can modify hashtag element before it gets loaded
                for (let h of c.hashtag) {
                    h.style = {
                        color: 'red'
                    };

                    h.onclick = () => {
                        alert(`${h.tag} clicked!`);
                    };
                }
            }

            if (c.urllink) {
                // you can modify urllink element before it gets loaded
                for (let u of c.urllink) {
                    u.style = {
                        color: 'red'
                    };

                    u.onclick = () => {
                        alert(`${u.url} clicked!`);
                    };
                }
            }
            return c;
        }
    });

    let addSmile = () => {
        // add emoji
        wysiwyg.command({
            element: '😃' // can be html string (ex - <div>Hello</div>) or Node elements (ex - document.createElement('div'))
        });
    };

    let tablePlugin = (col, row) => {
        wysiwyg.command({
            element: createTable(col, row), // create custom table element, from plugins.js
        });
    }

    let exportData = () => {
        alert('Check console for exported data!');
        wysiwyg.export(preExport => {
            // preExport is the preprocessed data before export
            console.log({ preExport });
        }).then(exported => {
            // e is the exported data
            console.log({ exported });
        });
    };
</script>
